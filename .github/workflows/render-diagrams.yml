name: Render PlantUML Diagrams

on:
  push:
    paths:
      - 'docs/**/*.md'
  pull_request:
    paths:
      - 'docs/**/*.md'

permissions:
  contents: write

jobs:
  render-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Pull PlantUML Docker image
        run: docker pull plantuml/plantuml-cli:latest

      - name: Create directory structure
        run: |
          mkdir -p docs/images/db
          mkdir -p docs/images/arch
          mkdir -p docs/images/deploy
          mkdir -p docs/images/usecase

      - name: Extract and render diagrams
        run: python .github/scripts/extract-and-render.py

      - name: Commit rendered images and patched markdown
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit_message: "docs: render PlantUML diagrams to SVG [skip ci]"
          skip_dirty_check: false
          file_pattern: |
            docs/images/**/*.svg
            docs/**/*.md